<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymouse — chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1e1e2e;
    --panel: #2a2a3d;
    --panel-raised: #33334a;
    --accent: #7c5cff;
    --accent-hover: #9579ff;
    --text: #e6e6f0;
    --text-muted: #9a9ab0;
    --sender-bubble: #7c5cff;
    --recipient-bubble: #3a3a4d;
    --danger: #ff6b6b;
    --border: #38384f;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; height:100%;
    background: radial-gradient(circle at 20% -10%, #29294080 0%, transparent 45%),
                radial-gradient(circle at 100% 10%, #7c5cff14 0%, transparent 40%),
                var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
  }
  .mono{ font-family: 'JetBrains Mono', monospace; }
  .display{ font-family: 'Space Grotesk', sans-serif; }

  #app{ height:100%; display:flex; align-items:center; justify-content:center; padding:20px; }

  /* ---------- Main menu ---------- */
  .menu-card{
    width: 380px;
    max-width: 100%;
    text-align:center;
  }
  .logo-row{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:6px; }
  .logo-dot{
    width:10px; height:10px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(124,92,255,.6);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(124,92,255,.55); }
    70%{ box-shadow: 0 0 0 10px rgba(124,92,255,0); }
    100%{ box-shadow: 0 0 0 0 rgba(124,92,255,0); }
  }
  .menu-card h1{
    font-size: 34px; margin: 0; letter-spacing: -0.02em;
    font-weight: 700;
  }
  .menu-card p.tagline{
    color: var(--text-muted); margin: 6px 0 34px; font-size: 14px;
  }
  .btn{
    border:0; border-radius:10px; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14px;
    padding: 12px 20px;
    background: var(--accent); color:#fff;
    transition: background .15s ease, transform .1s ease;
  }
  .btn:hover{ background: var(--accent-hover); }
  .btn:active{ transform: scale(0.98); }
  .btn-block{ width:100%; display:block; margin-bottom:12px; }
  .btn-secondary{
    background: transparent; color: var(--text); border:1px solid var(--border);
  }
  .btn-secondary:hover{ background: var(--panel-raised); }
  .btn-ghost{
    background:none; color: var(--text-muted); border:none; font-weight:500;
    text-decoration: underline; text-underline-offset:3px;
  }

  /* ---------- Panels / forms ---------- */
  .panel{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }
  .field-label{
    display:block; text-align:left; font-size:12px; color:var(--text-muted);
    margin: 14px 0 6px; text-transform: uppercase; letter-spacing:.06em;
  }
  input[type=text], input[type=password]{
    width:100%; background: var(--bg); border:1px solid var(--border);
    color: var(--text); border-radius:8px; padding:11px 12px;
    font-family:'Inter',sans-serif; font-size:14px; outline:none;
    transition: border-color .15s ease;
  }
  input:focus{ border-color: var(--accent); }
  .error-text{
    color: var(--danger); font-size:12.5px; text-align:left; margin-top:10px;
    line-height:1.5; display:none;
  }
  .error-text.show{ display:block; }
  .back-row{ margin-top:18px; text-align:center; }

  /* ---------- Chat screen ---------- */
  #chatScreen{ display:none; width:100%; height:100%; }
  .chat-shell{
    max-width: 560px; height: 100%; max-height: 720px; margin: 0 auto;
    display:flex; flex-direction:column;
    background: var(--panel);
    border:1px solid var(--border); border-radius:16px;
    overflow:hidden; box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }
  .chat-header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 18px; border-bottom:1px solid var(--border);
    background: var(--panel-raised);
  }
  .chat-header .who{ display:flex; flex-direction:column; }
  .chat-header .who .name{ font-weight:600; font-size:14px; }
  .chat-header .who .id{ font-size:11.5px; color:var(--text-muted); }
  .icon-btn{
    background:none; border:1px solid var(--border); color:var(--text-muted);
    border-radius:8px; padding:7px 10px; font-size:12px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .icon-btn:hover{ color:var(--text); border-color: var(--accent); }

  .target-row{ padding: 12px 18px; border-bottom:1px solid var(--border); }
  select#messageTarget{
    width:100%; background: var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:8px; padding:9px 10px;
    font-family:'Inter',sans-serif; font-size:13.5px; outline:none;
  }

  .chat-log{
    flex:1; overflow-y:auto; padding: 18px; display:flex; flex-direction:column; gap:10px;
  }
  .chat-log .system-line{
    text-align:center; color:var(--text-muted); font-size:12px; margin: 4px 0 14px;
    line-height:1.6;
  }
  .bubble-row{ display:flex; }
  .bubble-row.sender{ justify-content:flex-end; }
  .bubble-row.recipient{ justify-content:flex-start; }
  .bubble{
    max-width: 72%;
    padding: 9px 12px; border-radius: 14px; font-size: 13.5px; line-height:1.45;
    white-space: pre-wrap; word-break: break-word;
    animation: rise .18s ease;
  }
  @keyframes rise{ from{ opacity:0; transform: translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .bubble.sender{ background: var(--sender-bubble); color:#fff; border-bottom-right-radius:4px; }
  .bubble.recipient{ background: var(--recipient-bubble); color: var(--text); border-bottom-left-radius:4px; }
  .bubble .meta{
    display:block; font-size:10.5px; opacity:.65; margin-top:4px;
    font-family:'JetBrains Mono', monospace;
  }
  .bubble .from-label{
    display:block; font-size:10.5px; opacity:.75; margin-bottom:3px; font-weight:600;
  }

  .compose-row{
    display:flex; gap:8px; align-items:flex-end;
    padding: 12px; border-top: 1px solid var(--border); background: var(--panel-raised);
  }
  textarea#inputField{
    flex:1; resize:none; background: var(--bg); border:1px solid var(--border);
    color:var(--text); border-radius:10px; padding:10px 12px; font-family:'Inter',sans-serif;
    font-size:13.5px; outline:none; min-height:40px; max-height:100px;
  }
  textarea#inputField:focus{ border-color: var(--accent); }

  .empty-state{ margin:auto; text-align:center; color:var(--text-muted); font-size:13px; padding: 0 30px;}

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 8px; }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<div id="app">

  <!-- MAIN MENU -->
  <div id="mainMenu" class="menu-card">
    <div class="logo-row">
      <span class="logo-dot"></span>
      <h1 class="display">Anonymouse</h1>
    </div>
    <p class="tagline">no email, no tracking, just an ID.</p>
    <div class="panel">
      <button class="btn btn-block" onclick="showScreen('signup')">New User</button>
      <button class="btn btn-secondary btn-block" style="margin-bottom:0" onclick="showScreen('login')">Returning User</button>
    </div>
  </div>

  <!-- SIGN UP -->
  <div id="signupScreen" class="menu-card hidden">
    <div class="logo-row"><span class="logo-dot"></span><h1 class="display" style="font-size:24px;">Create your ID</h1></div>
    <div class="panel">
      <label class="field-label">Username</label>
      <input type="text" id="signupUsername" maxlength="40" placeholder="e.g. nightowl">
      <label class="field-label">Password</label>
      <input type="password" id="signupPassword" placeholder="8+ characters">
      <div class="error-text" id="signupError">Max name length is 20 characters. No spaces.<br>Password must be 8 characters or more.</div>
      <button class="btn btn-block" style="margin-top:20px;" onclick="handleSignup()">Sign Up</button>
      <div class="back-row"><button class="btn btn-ghost" onclick="showScreen('menu')">&larr; back</button></div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginScreen" class="menu-card hidden">
    <div class="logo-row"><span class="logo-dot"></span><h1 class="display" style="font-size:24px;">Welcome back</h1></div>
    <div class="panel">
      <label class="field-label">Your ID</label>
      <input type="text" id="loginUserId" class="mono" placeholder="e.g. 4821">
      <label class="field-label">Password</label>
      <input type="password" id="loginPassword" placeholder="Password">
      <div class="error-text" id="loginError">ID or password not recognized.</div>
      <button class="btn btn-block" style="margin-top:20px;" onclick="handleLogin()">Login</button>
      <div class="back-row"><button class="btn btn-ghost" onclick="showScreen('menu')">&larr; back</button></div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chatScreen">
    <div class="chat-shell">
      <div class="chat-header">
        <div class="who">
          <span class="name" id="headerUsername">—</span>
          <span class="id mono" id="headerId">#0000</span>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="icon-btn" onclick="openNewSession()" title="Open another session to test chatting with yourself">+ session</button>
          <button class="icon-btn" onclick="logout()">Log out</button>
        </div>
      </div>
      <div class="target-row">
        <select id="messageTarget" onchange="onTargetChange()"></select>
      </div>
      <div class="chat-log" id="chatLog"></div>
      <div class="compose-row">
        <textarea id="inputField" placeholder="Type a message…" rows="1"></textarea>
        <button class="btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   ANONYMOUSE — browser rewrite of the original Tkinter demo
   Shared "server" state lives in localStorage (mirrors the
   original message_data.json). Each browser tab is its own
   session (sessionStorage), same as each Toplevel() window
   was its own chat window in the desktop version. Tabs stay
   in sync via the 'storage' event.
   ============================================================ */

const DATA_KEY = 'anonymouse_data';
const SESSION_KEY = 'anonymouse_session';

function loadData(){
  const raw = localStorage.getItem(DATA_KEY);
  if(!raw){
    return { users:{}, knownUsers:{}, contacts:{}, chats:{} };
  }
  try{ return JSON.parse(raw); }
  catch(e){ return { users:{}, knownUsers:{}, contacts:{}, chats:{} }; }
}

function saveData(data){
  localStorage.setItem(DATA_KEY, JSON.stringify(data));
}

function getSession(){
  const raw = sessionStorage.getItem(SESSION_KEY);
  return raw ? JSON.parse(raw) : null;
}

function setSession(userID){
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ userID }));
}

function clearSession(){
  sessionStorage.removeItem(SESSION_KEY);
}

/* current view state for this tab */
let currentTargetId = null;

function showScreen(name){
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('signupScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  if(name === 'menu') document.getElementById('mainMenu').classList.remove('hidden');
  if(name === 'signup') document.getElementById('signupScreen').classList.remove('hidden');
  if(name === 'login') document.getElementById('loginScreen').classList.remove('hidden');
  if(name === 'chat'){
    document.getElementById('app').style.display = 'block';
    document.getElementById('chatScreen').style.display = 'block';
  }
}

function randomUserID(existingIds){
  let id;
  do{ id = Math.floor(Math.random() * 9999) + 1; }
  while(existingIds.includes(id));
  return id;
}

function flashError(el){
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ---------------- Sign up ---------------- */
function handleSignup(){
  const usernameEl = document.getElementById('signupUsername');
  const passwordEl = document.getElementById('signupPassword');
  const errorEl = document.getElementById('signupError');

  const username = usernameEl.value;
  const password = passwordEl.value;

  if(username.length > 20 || username.trim() === '' || /\s/.test(username) || password.length < 8){
    flashError(errorEl);
    return;
  }

  const data = loadData();
  const existingIds = Object.keys(data.knownUsers).map(Number);
  const userID = randomUserID(existingIds);

  data.knownUsers[userID] = [username, userID, password];
  data.users[userID] = [username, userID];

  // wire up contacts both ways so the new user can actually talk to people
  data.contacts[userID] = data.contacts[userID] || [];
  for(const otherIdStr of Object.keys(data.users)){
    const otherId = Number(otherIdStr);
    if(otherId === userID) continue;
    if(!data.contacts[userID].includes(otherId)) data.contacts[userID].push(otherId);
    data.contacts[otherId] = data.contacts[otherId] || [];
    if(!data.contacts[otherId].includes(userID)) data.contacts[otherId].push(userID);
  }

  saveData(data);
  setSession(userID);
  usernameEl.value = '';
  passwordEl.value = '';
  enterChat(userID);
}

/* ---------------- Login ---------------- */
function handleLogin(){
  const idEl = document.getElementById('loginUserId');
  const passwordEl = document.getElementById('loginPassword');
  const errorEl = document.getElementById('loginError');

  const userID = parseInt(idEl.value, 10);
  const password = passwordEl.value;
  const data = loadData();

  if(data.knownUsers[userID] && data.knownUsers[userID][2] === password){
    setSession(userID);
    idEl.value = '';
    passwordEl.value = '';
    enterChat(userID);
  } else {
    flashError(errorEl);
    idEl.value = '';
    passwordEl.value = '';
  }
}

function logout(){
  clearSession();
  currentTargetId = null;
  showScreen('menu');
}

function openNewSession(){
  window.open(window.location.pathname, '_blank');
}

/* ---------------- Chat screen ---------------- */
function enterChat(userID){
  const data = loadData();
  const me = data.users[userID];
  document.getElementById('headerUsername').textContent = me[0];
  document.getElementById('headerId').textContent = '#' + userID;
  showScreen('chat');
  populateTargetDropdown(userID);
  renderChatLog(userID);
}

function populateTargetDropdown(userID){
  const data = loadData();
  const select = document.getElementById('messageTarget');
  const contactIds = data.contacts[userID] || [];
  const previousValue = currentTargetId;

  select.innerHTML = '';

  if(contactIds.length === 0){
    const opt = document.createElement('option');
    opt.textContent = 'No other users yet';
    opt.disabled = true;
    opt.selected = true;
    select.appendChild(opt);
    currentTargetId = null;
    return;
  }

  contactIds.forEach(id => {
    const contact = data.users[id];
    if(!contact) return;
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = `${id} – ${contact[0]}`;
    select.appendChild(opt);
  });

  if(previousValue && contactIds.includes(previousValue)){
    select.value = previousValue;
    currentTargetId = previousValue;
  } else {
    currentTargetId = Number(select.value);
  }
}

function onTargetChange(){
  const select = document.getElementById('messageTarget');
  currentTargetId = Number(select.value);
  const session = getSession();
  if(session) renderChatLog(session.userID);
}

function renderChatLog(userID){
  const data = loadData();
  const log = document.getElementById('chatLog');
  log.innerHTML = '';

  if(currentTargetId == null){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No one to chat with yet. Open another session (+ session above) and sign up a second ID to test messaging.';
    log.appendChild(empty);
    return;
  }

  const targetUser = data.users[currentTargetId];
  const header = document.createElement('div');
  header.className = 'system-line';
  header.textContent = `--- CHATTING WITH: ${targetUser ? targetUser[0] : currentTargetId} ---`;
  log.appendChild(header);

  const thread = (data.chats[userID] && data.chats[userID][currentTargetId]) || [];

  thread.forEach(message => {
    const row = document.createElement('div');
    row.className = 'bubble-row ' + message.side;

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + message.side;

    if(message.side === 'recipient'){
      const label = document.createElement('span');
      label.className = 'from-label';
      label.textContent = '@' + message.username;
      bubble.appendChild(label);
    }

    const textNode = document.createElement('span');
    textNode.textContent = message.text;
    bubble.appendChild(textNode);

    const meta = document.createElement('span');
    meta.className = 'meta';
    meta.textContent = (message.side === 'sender' ? '>> ' : '<< ') + message.time;
    bubble.appendChild(meta);

    row.appendChild(bubble);
    log.appendChild(row);
  });

  log.scrollTop = log.scrollHeight;
}

function sendMessage(){
  const session = getSession();
  if(!session || currentTargetId == null) return;

  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if(text === '') return;

  const senderID = session.userID;
  const recipientID = currentTargetId;
  const data = loadData();

  const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit', hour12: true });

  data.chats[senderID] = data.chats[senderID] || {};
  data.chats[recipientID] = data.chats[recipientID] || {};
  data.chats[senderID][recipientID] = data.chats[senderID][recipientID] || [];
  data.chats[recipientID][senderID] = data.chats[recipientID][senderID] || [];

  const senderName = data.users[senderID][0];

  data.chats[senderID][recipientID].push({ side: 'sender', text, time, target: recipientID });
  data.chats[recipientID][senderID].push({ side: 'recipient', username: senderName, text, time });

  saveData(data);
  input.value = '';
  renderChatLog(senderID);
}

document.getElementById('inputField').addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

/* keep tabs in sync when another tab (another "user") changes shared data */
window.addEventListener('storage', (e) => {
  if(e.key !== DATA_KEY) return;
  const session = getSession();
  if(!session) return;
  populateTargetDropdown(session.userID);
  renderChatLog(session.userID);
});

/* ---------------- boot ---------------- */
(function init(){
  const session = getSession();
  if(session && loadData().users[session.userID]){
    enterChat(session.userID);
  } else {
    showScreen('menu');
  }
})();
</script>

</body>
</html>
